name: beta-deploy
on:
  push:
    branches: [ beta ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    - run: npm install
    - run: npm run stage-beta-keys
      env:
        BETA_API_KEY: ${{ secrets.BETA_API_KEY }}
        BETA_CLIENT_SECRET: ${{ secrets.BETA_CLIENT_SECRET }}
        BETA_DIM_API_KEY: ${{ secrets.BETA_DIM_API_KEY }}
    - run: npx ng build --configuration production
    - name: Deploy via rsync
      env:
        SSH_KEY: ${{ secrets.BETA_SSH }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        rsync -avz --delete \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.BETA_PORT }}" \
          ./dist/d2-checklist/ \
          ${{ secrets.BETA_UID }}@${{ secrets.BETA_HOST }}:/home/${{ secrets.BETA_UID }}/d2checklist-beta/
        rm -f ~/.ssh/deploy_key

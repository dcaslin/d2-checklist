<nav mat-tab-nav-bar [tabPanel]="tabPanel" color="accent">
    <a mat-tab-link routerLink="badges" routerLinkActive #rla3="routerLinkActive" [active]="rla3.isActive">
        <fa-icon [icon]="iconService.farBadgeCheck"></fa-icon><span class="d-none d-md-inline">&ensp;Badges</span>
    </a>
    <a mat-tab-link routerLink="search" routerLinkActive #rla5="routerLinkActive" [active]="rla5.isActive">
        <fa-icon [icon]="iconService.farSearch"></fa-icon><span class="d-none d-md-inline">&ensp;Search</span>
    </a>
</nav>
<mat-tab-nav-panel #tabPanel>
  <ng-container *ngIf="state.allLoaded(); else notLoaded">
      <router-outlet></router-outlet>
  </ng-container>
</mat-tab-nav-panel>

<ng-template #notLoaded>
    <br>
    <h1><fa-icon [icon]="iconService.farSpinner" animation="spin-pulse" [fixedWidth]="true"></fa-icon></h1>
</ng-template>
